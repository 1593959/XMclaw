name: Python — lint & test

# Replaces the old conda-based workflow. Uses the project's own lockfile
# (requirements-dev-lock.txt) so CI is reproducible and matches what
# `pip install -e ".[dev]"` would give a contributor. Runs on push to main
# and on every PR.

on:
  # push-to-main always runs the full suite (ground truth for "main is
  # green"). PRs use the smart-gate (Epic #11) to cut feedback time —
  # a typo in a provider shouldn't wait for the browser-tool tests.
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements-lock.txt'
      - 'requirements-dev-lock.txt'
      - '.github/workflows/python-ci.yml'
      - 'scripts/test_lanes.yaml'
      - 'scripts/test_changed.py'
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements-lock.txt'
      - 'requirements-dev-lock.txt'
      - '.github/workflows/python-ci.yml'
      - 'scripts/test_lanes.yaml'
      - 'scripts/test_changed.py'
  workflow_dispatch:

jobs:
  lint-and-test:
    # Anti-req #14: the v2 runtime must work on Windows / macOS / Linux.
    # Matrix makes "cross-platform" a CI claim, not just a docstring
    # promise. Windows was the dev environment the project was born on;
    # macOS is added so POSIX-specific code paths (chmod 0o600 on the
    # pairing file, fork/spawn semantics in ProcessSkillRuntime) stay
    # tested against a second POSIX flavour.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false    # one OS failure doesn't hide the others' results
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10']

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Smart-gate needs the merge-base with the PR target to run
          # `git diff origin/$base...HEAD`. Full history is the
          # simplest way to guarantee the base commit is present — the
          # repo is small enough that this doesn't hurt.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements-dev-lock.txt

      - name: Install dev dependencies (pinned)
        run: |
          pip install -r requirements-dev-lock.txt
          pip install -e . --no-deps

      # Hard-fail set: syntax errors and undefined names only. Mirrors the
      # old conda workflow's `flake8 --select=E9,F63,F7,F82` gate — these
      # are "your code is broken" errors, not style.
      - name: Lint (blocking — syntax & undefined names)
        run: ruff check --select E9,F63,F7,F82 .

      # Full ruff pass is informational. continue-on-error lets the
      # step report its findings without failing the job — works
      # uniformly across bash (Linux/macOS) and pwsh (Windows) without
      # per-shell ``||`` syntax gymnastics. Flip off once the ~150
      # accumulated warnings are cleaned up in a dedicated PR.
      - name: Lint (warnings — full ruleset)
        continue-on-error: true
        run: ruff check .

      # Smart-gate (Epic #11): on PRs, run only the lanes that match
      # the diff against the target branch. Falls back to the full
      # suite for pyproject / lockfile / workflow edits (see
      # scripts/test_lanes.yaml → full_fallback).
      - name: Test (smart-gate, PR only)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git fetch --no-tags --prune origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          python scripts/test_changed.py --base "origin/${{ github.base_ref }}" -- -v

      # Full suite on push-to-main and on workflow_dispatch — ground
      # truth for "main is green" and a manual safety net.
      - name: Test (full suite)
        if: github.event_name != 'pull_request'
        run: pytest tests/ -v

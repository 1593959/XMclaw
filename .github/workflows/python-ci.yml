name: Python - lint & package check

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements-lock.txt'
      - 'requirements-dev-lock.txt'
      - '.github/workflows/python-ci.yml'
      - 'webui/**'
      - 'xmclaw/daemon/webui_dist/**'
  pull_request:
    paths:
      - '**.py'
      - 'pyproject.toml'
      - 'requirements-lock.txt'
      - 'requirements-dev-lock.txt'
      - '.github/workflows/python-ci.yml'
      - 'webui/**'
      - 'xmclaw/daemon/webui_dist/**'
  workflow_dispatch:

jobs:
  webui-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect webui changes
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if git diff --quiet "$BASE" HEAD -- webui/ xmclaw/daemon/webui_dist/ 2>/dev/null; then
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.changed.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: webui/package-lock.json

      - name: Build webui
        if: steps.changed.outputs.run == 'true'
        working-directory: webui
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Verify dist matches source
        if: steps.changed.outputs.run == 'true'
        run: git diff --exit-code -- xmclaw/daemon/webui_dist/

  lint-and-package:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.14']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements-dev-lock.txt

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev-lock.txt
          pip install -e . --no-deps

      - name: Lint syntax and undefined names
        run: ruff check --select E9,F63,F7,F82 .

      - name: Resolve all optional dependencies
        run: python -m pip install --dry-run --ignore-installed ".[all]"

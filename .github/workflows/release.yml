name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, for example v1.0.1. The tag must already exist on origin.'
        required: true

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject.toml version matches tag
        shell: bash
        run: |
          PYPROJECT_VERSION=$(grep -m1 -oE '^version = "[^"]+"' pyproject.toml | cut -d'"' -f2)
          EXPECTED="${{ steps.version.outputs.version }}"
          if [ "$PYPROJECT_VERSION" != "$EXPECTED" ]; then
            echo "::error::pyproject.toml version ($PYPROJECT_VERSION) does not match tag ($EXPECTED)."
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: XMclaw ${{ steps.version.outputs.tag }}
          draft: false
          generate_release_notes: true
          body: |
            ## XMclaw ${{ steps.version.outputs.tag }}

            XMclaw is released as a Python package and service runtime, not a desktop executable.

            Install on Windows:

            ```powershell
            irm https://raw.githubusercontent.com/1593959/XMclaw/${{ steps.version.outputs.tag }}/scripts/install.ps1 | iex
            ```

            Or install with pip from source:

            ```bash
            pip install "xmclaw[all] @ git+https://github.com/1593959/XMclaw.git@${{ steps.version.outputs.tag }}"
            ```

            Docker images are published by the Docker workflow for this tag.

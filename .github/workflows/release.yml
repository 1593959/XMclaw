name: Release — Windows installer

# Triggered by pushing a semver tag, e.g. `git tag v0.2.0 && git push origin v0.2.0`.
# Builds the standalone XMclaw.exe and the InnoSetup installer on a Windows runner,
# then attaches both to a GitHub draft release named after the tag. The release is
# kept as a draft so you can review the artifacts and edit the release notes before
# hitting "Publish". Publishing the release then triggers python-publish.yml to push
# to PyPI.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.0). The tag must already exist on origin.'
        required: true

permissions:
  contents: write  # required to create the release

jobs:
  windows-build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout (at tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          # GITHUB_REF is `refs/tags/vX.Y.Z` for tag pushes, else use the dispatch input.
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release $TAG (version $VERSION)"

      - name: Verify pyproject.toml version matches tag
        shell: bash
        run: |
          PYPROJECT_VERSION=$(grep -m1 -oE '^version = "[^"]+"' pyproject.toml | cut -d'"' -f2)
          EXPECTED="${{ steps.version.outputs.version }}"
          if [ "$PYPROJECT_VERSION" != "$EXPECTED" ]; then
            echo "::error::pyproject.toml version ($PYPROJECT_VERSION) does not match tag ($EXPECTED). Update pyproject.toml before tagging."
            exit 1
          fi

      - name: Sync version into InnoSetup script
        shell: bash
        run: |
          # xmclaw_setup.iss pins MyAppVersion at compile time; rewrite it to match the tag.
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/#define MyAppVersion \"[^\"]*\"/#define MyAppVersion \"$VERSION\"/" scripts/xmclaw_setup.iss
          sed -i "s/AppId={{XMCLAW-APP-[^}]*}}/AppId={{XMCLAW-APP-$VERSION}}/" scripts/xmclaw_setup.iss
          grep -E "MyAppVersion|AppId=" scripts/xmclaw_setup.iss

      - name: Install runtime dependencies (pinned)
        run: pip install -r requirements-lock.txt

      - name: Install build tools
        run: pip install pyinstaller

      - name: Install InnoSetup
        run: choco install innosetup --no-progress -y

      - name: Build executable + installer
        # --skip-shortcut avoids winshell/pywin32 on a headless runner.
        run: python scripts/build_exe_fast.py --skip-shortcut

      - name: Stage artifacts with version suffix
        id: stage
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-artifacts
          cp "dist/XMclaw.exe"        "release-artifacts/XMclaw-${VERSION}-windows-x64.exe"
          cp "dist/XMclaw_Setup.exe"  "release-artifacts/XMclaw-${VERSION}-windows-x64-setup.exe"
          ls -lh release-artifacts
          echo "dir=release-artifacts" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts (for inspection even if release step fails)
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ steps.version.outputs.version }}
          path: ${{ steps.stage.outputs.dir }}/
          retention-days: 14

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: XMclaw ${{ steps.version.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            release-artifacts/XMclaw-${{ steps.version.outputs.version }}-windows-x64.exe
            release-artifacts/XMclaw-${{ steps.version.outputs.version }}-windows-x64-setup.exe
          body: |
            ## XMclaw ${{ steps.version.outputs.tag }}

            Windows release. Two artifacts:

            - **`XMclaw-${{ steps.version.outputs.version }}-windows-x64-setup.exe`** — one-click installer (recommended for users).
            - **`XMclaw-${{ steps.version.outputs.version }}-windows-x64.exe`** — standalone executable.

            First run will create `daemon/config.json` next to the executable; add your API keys via `xmclaw config init` or set `XMC__*` environment variables.

            See [README.md](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/README.md) for the full setup.

            ---
            _This release was built automatically from tag `${{ steps.version.outputs.tag }}`. Review the generated notes above and hit **Publish** when ready — publishing also triggers PyPI upload._

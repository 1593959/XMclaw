name: Web — build check

# Verifies the Vite frontend still builds. Runs on any change under web/ or
# to this workflow itself; also on workflow_dispatch for manual re-runs.
# Keeps `release.yml` simple — the release build bundles the frontend output
# assuming it's green here first.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies (locked)
        run: npm ci

      - name: Build
        run: npm run build

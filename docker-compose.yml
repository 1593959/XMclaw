version: '3.8'

services:
  xmclaw:
    build: .
    ports:
      - "8766:8766"
    volumes:
      - xmclaw-data:/data/.xmclaw
    environment:
      - XMC_LANCEDB_URI=/data/.xmclaw/memory.lance
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8766/api/v2/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  xmclaw-data:

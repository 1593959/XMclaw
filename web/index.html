<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMclaw</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">XMclaw</div>
                <div class="tagline">Self-Evolving Agent</div>
            </div>
            <nav class="nav">
                <a href="#" class="nav-item active" data-view="chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <span>Chat</span>
                </a>
                <a href="#" class="nav-item" data-view="settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    <span>Settings</span>
                </a>
                <a href="#" class="nav-item" data-view="tools">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                    <span>Tools</span>
                </a>
                <a href="#" class="nav-item" data-view="memory">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 2a10 10 0 0 1 10 10"></path><path d="M12 12 21.9 9.6"></path></svg>
                    <span>Memory</span>
                </a>
                <a href="#" class="nav-item" data-view="evolution">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4"></path><path d="m16.2 7.8 2.9-2.9"></path><path d="M18 12h4"></path><path d="m16.2 16.2 2.9 2.9"></path><path d="M12 18v4"></path><path d="m4.9 19.1 2.9-2.9"></path><path d="M2 12h4"></path><path d="m4.9 4.9 2.9 2.9"></path></svg>
                    <span>Evolution</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="status-row">
                    <span class="status-dot" id="status-dot"></span>
                    <span class="status-text" id="status-text">Connecting</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="topbar-title" id="topbar-title">Chat</div>
                <div class="topbar-meta">
                    <span class="model-badge" id="model-badge">default</span>
                    <span class="token-count" id="token-count">- tokens</span>
                </div>
            </header>

            <!-- Chat View -->
            <div class="view active" id="view-chat">
                <div class="chat" id="chat"></div>
                <div class="input-area">
                    <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
                    <button id="send" aria-label="Send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>

            <!-- Settings View -->
            <div class="view" id="view-settings">
                <div class="settings-panel">
                    <h2>LLM Configuration</h2>
                    <div class="form-group">
                        <label>Provider</label>
                        <select id="setting-provider">
                            <option value="openai">OpenAI</option>
                            <option value="anthropic">Anthropic</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="password" id="setting-apikey" placeholder="sk-...">
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <input type="text" id="setting-model" placeholder="gpt-4o or claude-3-5-sonnet">
                    </div>
                    <div class="form-group">
                        <label>Temperature</label>
                        <input type="range" id="setting-temp" min="0" max="2" step="0.1" value="0.7">
                        <span class="range-value" id="temp-value">0.7</span>
                    </div>
                    <button class="btn-primary" id="save-settings">Save Settings</button>
                </div>
            </div>

            <!-- Tools View -->
            <div class="view" id="view-tools">
                <div class="placeholder">
                    <p>Available tools will be shown here during agent execution.</p>
                </div>
            </div>

            <!-- Memory View -->
            <div class="view" id="view-memory">
                <div class="placeholder">
                    <p>Memory entries and session history will appear here.</p>
                </div>
            </div>

            <!-- Evolution View -->
            <div class="view" id="view-evolution">
                <div class="placeholder">
                    <p>Evolution metrics and gene/skill status will be displayed here.</p>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/main.js"></script>
</body>
</html>

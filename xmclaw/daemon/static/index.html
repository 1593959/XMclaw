<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XMclaw v2</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <!-- ── sidebar ────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="brand">
        <span class="lobster">🦞</span>
        <span class="brand-name">XMclaw</span>
        <span class="brand-v2">v2</span>
      </div>

      <button id="new-session" class="btn-primary full">
        <span class="icon">+</span> New chat
      </button>

      <div class="sidebar-label">Sessions</div>
      <nav id="session-list" class="session-list">
        <!-- populated by JS -->
      </nav>

      <div class="sidebar-footer">
        <div id="conn-indicator" class="indicator disconnected">
          <span class="dot"></span>
          <span id="conn-text">disconnected</span>
        </div>
        <div class="build" id="build-info">—</div>
      </div>
    </aside>

    <!-- ── main ──────────────────────────────────────────────── -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="agent-avatar">🦞</div>
          <div class="agent-meta">
            <div class="agent-name">agent</div>
            <div class="agent-sub" id="agent-sub">—</div>
          </div>
        </div>
        <div class="topbar-right">
          <span class="session-id" id="session-id"></span>
        </div>
      </header>

      <section class="events-wrap">
        <div id="events" class="events">
          <!-- empty-state rendered by JS when no messages -->
        </div>

        <div class="composer">
          <form id="send-form" class="composer-row">
            <textarea id="user-input" rows="1"
              placeholder="Message the agent... (Enter to send, Shift+Enter for newline)"></textarea>
            <button type="submit" class="btn-primary send-btn" aria-label="Send">
              <span class="icon">↑</span>
            </button>
          </form>
          <div class="composer-hint">
            <span id="cost-ticker" class="cost-ticker"></span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>

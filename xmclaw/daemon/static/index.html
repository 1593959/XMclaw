<!DOCTYPE html>
<!--
  XMclaw Web UI · Phase 0 scaffold
  Spec: docs/FRONTEND_DESIGN.md
  Tech: Preact + htm via ESM (see bootstrap.js for CDN / vendor switch)
  No build step. Edit + refresh.
-->
<html lang="zh-CN" data-theme="dark" data-density="comfortable">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>XMclaw</title>

    <!-- Hermes 1:1 design system. Tokens first; everything else cascades. -->
    <link rel="stylesheet" href="./styles/hermes-tokens.css" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/hermes-backdrop.css" />
    <link rel="stylesheet" href="./styles/hermes-shell.css" />
    <link rel="stylesheet" href="./styles/hermes-shell-footer.css" />
    <link rel="stylesheet" href="./styles/hermes-context.css" />
    <link rel="stylesheet" href="./styles/hermes-pages.css" />
    <link rel="stylesheet" href="./styles/hermes-sessions.css" />
    <link rel="stylesheet" href="./styles/hermes-skills.css" />
    <link rel="stylesheet" href="./styles/hermes-cron.css" />
    <link rel="stylesheet" href="./styles/hermes-config.css" />
    <link rel="stylesheet" href="./styles/hermes-logs.css" />
    <link rel="stylesheet" href="./styles/hermes-env.css" />
    <link rel="stylesheet" href="./styles/hermes-analytics.css" />
    <link rel="stylesheet" href="./styles/hermes-docs.css" />
    <link rel="stylesheet" href="./styles/hermes-slash.css" />
    <link rel="stylesheet" href="./styles/hermes-modelpicker.css" />
    <link rel="stylesheet" href="./styles/hermes-codeblock.css" />
    <link rel="stylesheet" href="./styles/hermes-chatsidebar.css" />
    <link rel="stylesheet" href="./styles/hermes-datapage-compat.css" />
    <link rel="stylesheet" href="./styles/chat.css" />
    <link rel="stylesheet" href="./styles/chat-markdown.css" />
    <link rel="stylesheet" href="./styles/workspace.css" />
    <link rel="stylesheet" href="./styles/toast.css" />
    <link rel="stylesheet" href="./components/atoms/atoms.css" />

    <!--
      bootstrap.js does two jobs:
        1. Resolve Preact + htm (CDN first, vendor fallback).
        2. Dynamic-import ./app.js once the framework is ready.
      We keep it as a module so top-level await is available.
    -->
    <script type="module" src="./bootstrap.js"></script>
  </head>
  <body>
    <!--
      Three-region shell. Phase 0 renders placeholder pages so the visual
      system (tokens + layout grid + focus ring) and the routing + store
      wiring can be exercised end-to-end. Phase 1 replaces the placeholders
      with the real Chat / Sidebar / StatusBar per FRONTEND_DESIGN.md §3.1.
    -->
    <div id="root" class="xmc-app" aria-busy="true">
      <noscript>
        <p style="padding:1rem">
          XMclaw requires JavaScript. Enable it and refresh.
        </p>
      </noscript>
    </div>

    <!--
      Bootstrap source indicator — wired in bootstrap.js. Lets us debug
      "is CDN reachable?" without opening devtools.
    -->
    <div id="xmc-bootstrap-status" role="status" aria-live="polite" hidden></div>
  </body>
</html>
